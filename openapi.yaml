openapi: 3.0.3
info:
  title: Bookstore Notification Service
  description: Handles sending notifications for order confirmations, welcome emails, cancellations, and store-wide broadcasts.
  version: 1.0.0

servers:
  - url: http://localhost:3003
    description: Local development

paths:
  /notify/send:
    post:
      summary: Send a notification
      description: >
        Receives triggers from other services (Order Service, User Service) to send notifications.
        Calls User Service via the API Gateway to get the recipient's email address.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendNotificationPayload'
      responses:
        '200':
          description: Notification sent successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  notification:
                    $ref: '#/components/schemas/Notification'
        '500':
          description: Failed to send notification
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /notify/broadcast:
    post:
      summary: Broadcast a store-wide alert
      description: >
        Sends a notification to multiple users at once (e.g., "Sale is Live!").
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BroadcastPayload'
      responses:
        '200':
          description: Broadcast sent successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  count:
                    type: number
                    example: 3
                  notifications:
                    type: array
                    items:
                      $ref: '#/components/schemas/Notification'
        '500':
          description: Failed to broadcast notification
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /notifications:
    get:
      summary: Get notifications for a user
      description: Returns the last 10 notifications for a given user.
      parameters:
        - in: query
          name: userId
          schema:
            type: string
          required: true
          description: The user's ID
      responses:
        '200':
          description: List of notifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Notification'
        '400':
          description: Missing userId parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Failed to retrieve notifications
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /notifications/{id}:
    delete:
      summary: Delete a notification
      description: Allows a user to clear a specific notification.
      parameters:
        - in: path
          name: id
          schema:
            type: string
          required: true
          description: The notification ID
      responses:
        '200':
          description: Notification deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Notification deleted
        '404':
          description: Notification not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    SendNotificationPayload:
      type: object
      required:
        - userId
        - type
        - message
      properties:
        userId:
          type: string
          example: "64f1a2b3c4d5e6f7a8b9c0d1"
        type:
          type: string
          enum: [Welcome, OrderConfirm, Cancellation]
          example: "OrderConfirm"
        message:
          type: string
          example: "Your order for Clean Code (LKR 2500) has been confirmed!"

    BroadcastPayload:
      type: object
      required:
        - message
        - userIds
      properties:
        message:
          type: string
          example: "Big Sale is Live! 50% off on all books!"
        userIds:
          type: array
          items:
            type: string
          example: ["user1", "user2", "user3"]

    Notification:
      type: object
      properties:
        _id:
          type: string
          example: "65a1b2c3d4e5f6a7b8c9d0e1"
        userId:
          type: string
          example: "64f1a2b3c4d5e6f7a8b9c0d1"
        message:
          type: string
          example: "Your order for Clean Code (LKR 2500) has been confirmed!"
        type:
          type: string
          enum: [Welcome, OrderConfirm, Cancellation]
          example: "OrderConfirm"
        status:
          type: string
          enum: [sent, failed]
          example: "sent"
        timestamp:
          type: string
          format: date-time
          example: "2026-03-02T10:30:00.000Z"

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: "Failed to send notification"
